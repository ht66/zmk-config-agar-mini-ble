description: Dynamic dual-speed mouse movement behavior

compatible: "zmk,behavior-dynamic-mouse-move"

include: one_param.yaml

properties:
  x-input-code:
    type: int
    required: true
  y-input-code:
    type: int
    required: true
  trigger-period-ms:
    type: int
    default: 16
  delay-ms:
    type: int
  time-to-max-speed-ms:
    type: int
    required: true
  acceleration-exponent:
    type: int
    default: 1
  speed1:
    type: int
    required: true
    description: Base speed for normal (slow) mode
  speed2:
    type: int
    required: true
    description: Base speed for fast mode